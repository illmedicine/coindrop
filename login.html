<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — CoinDrop</title>
    <link rel="icon" type="image/png" href="assets/logo.svg">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/register.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .login-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--navy-dark);
            padding: 100px 20px 60px;
        }
        .login-card {
            background: var(--white);
            border-radius: var(--radius-lg);
            padding: 48px 40px;
            max-width: 440px;
            width: 100%;
            box-shadow: var(--shadow-xl);
            text-align: center;
        }
        .login-logo { margin-bottom: 24px; }
        .login-logo .logo-text { color: var(--navy); font-size: 1.8rem; }
        .login-card h2 { color: var(--navy); margin-bottom: 8px; }
        .login-card > p { color: var(--gray-400); font-size: 0.9rem; margin-bottom: 32px; }
        .login-divider {
            display: flex; align-items: center; gap: 16px;
            margin: 24px 0; color: var(--gray-300); font-size: 0.8rem;
        }
        .login-divider::before, .login-divider::after {
            content: ''; flex: 1; height: 1px; background: var(--gray-200);
        }
        .login-help {
            margin-top: 24px; font-size: 0.85rem; color: var(--gray-400);
        }
        .login-help a { color: var(--orange); text-decoration: none; font-weight: 600; }
        .demo-notice {
            margin-top: 20px; padding: 12px; background: rgba(247,147,26,0.05);
            border: 1px solid rgba(247,147,26,0.15); border-radius: var(--radius-sm);
            font-size: 0.8rem; color: var(--gray-500);
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">
                <img src="assets/logo.svg" alt="CoinDrop" class="logo-img">
                <span class="logo-text">COIN<span class="logo-accent">DROP</span></span>
            </a>
            <div class="nav-links" id="nav-links">
                <a href="index.html">Home</a>
                <a href="register.html" class="btn btn-outline">Sign Up</a>
            </div>
            <button class="nav-toggle" id="nav-toggle" aria-label="Toggle menu">
                <i class="fas fa-bars"></i>
            </button>
        </div>
    </nav>

    <section class="login-page">
        <div class="login-card">
            <div class="login-logo">
                <span class="logo-text">COIN<span class="logo-accent">DROP</span></span>
            </div>
            <h2>Welcome Back</h2>
            <p>Sign in with your Discord account to access your dashboard.</p>

            <a href="#" class="btn btn-discord btn-block btn-lg" id="discord-login-btn" onclick="demoLogin(event)">
                <i class="fab fa-discord"></i> Sign in with Discord
            </a>

            <div class="login-divider">or</div>

            <div class="demo-notice">
                <i class="fas fa-info-circle text-orange"></i>
                <strong>Demo Mode:</strong> Click "Sign in with Discord" to preview the member dashboard with sample data.
            </div>

            <div class="login-help">
                Don't have an account? <a href="register.html">Join CoinDrop</a>
            </div>
        </div>
    </section>

    <script src="js/app.js"></script>
    <script>
        function demoLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('discord-login-btn');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Connecting...';
            btn.style.pointerEvents = 'none';

            localStorage.setItem('coindrop_user', JSON.stringify({
                id: 'demo_001',
                displayName: 'Demo User',
                avatar: 'https://api.dicebear.com/7.x/thumbs/svg?seed=Demo',
                joinDate: '2025-05-15',
                prestige: 'silver',
                tasksCompleted: 247,
                totalEarned: 1.84,
                activeSubscriptions: 12,
                activeFollows: 8,
            }));

            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 1500);
        }
    </script>
</body>
</html>
